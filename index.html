<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер Яндекс Директ | PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=YS+Text:wght@400;500;700&display=swap');
        :root {
            --bg-body: #111112;
            --bg-card: #1C1C1E;
            --text-main: #FFFFFF;
            --text-muted: #8A8A8E;
            --yandex-yellow: #FCDF30;
            --yandex-yellow-hover: #F2D22E;
            --border-color: #2C2C2E;
            --correct-bg: rgba(50, 205, 50, 0.15);
            --correct-border: #32CD32;
            --error-bg: rgba(255, 69, 58, 0.15);
            --error-border: #FF453A;
            --hint-color: #FF9F0A;
            --option-bg: #2C2C2E;
            --option-hover: #3A3A3C;
        }
        body {
            font-family: 'YS Text', 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px 10px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px; 
            margin: 0 auto;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            flex-grow: 1;
            width: 100%;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-container { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .logo-container svg { height: 28px; width: auto; }
        .title-text { font-size: 1.3em; font-weight: 700; letter-spacing: 0.5px; color: #fff; }
        
        /* --- СТИЛИ ДЛЯ ВЫПАДАЮЩЕГО МЕНЮ --- */
        .dropdown {
            position: relative;
            display: inline-block;
            margin-left: 10px;
        }
        .btn-menu {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            font-family: 'YS Text', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-menu:hover {
            background: #2C2C2E;
            color: #fff;
            border-color: #4A4A4C;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            background-color: var(--bg-card);
            min-width: 260px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            z-index: 1000;
            overflow: hidden;
        }
        .dropdown-content.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dropdown-content a {
            color: #EBEBEB;
            padding: 14px 18px;
            text-decoration: none;
            display: block;
            font-size: 0.95em;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border-color);
        }
        .dropdown-content a:last-child {
            border-bottom: none;
        }
        .dropdown-content a:hover {
            background-color: var(--option-hover);
            color: var(--yandex-yellow);
        }
        /* --------------------------------- */

        .top-controls { display: flex; gap: 10px; }

        #quiz-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: auto auto 1fr auto;
            gap: 20px 40px;
            align-items: start;
        }

        .question-grid {
            grid-column: 1 / 2;
            grid-row: 1 / 5;
            display: flex;
            align-content: flex-start;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 0;
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 10px;
        }
        .question-grid::-webkit-scrollbar { width: 6px; }
        .question-grid::-webkit-scrollbar-thumb { background-color: #444; border-radius: 3px; }
        
        .question-header { grid-column: 2 / 3; grid-row: 1 / 2; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0; }
        .question-text { grid-column: 2 / 3; grid-row: 2 / 3; font-size: 1.3em; font-weight: 500; margin: 0; color: #fff; line-height: 1.4;}
        #options-container { grid-column: 2 / 3; grid-row: 3 / 4; margin-top: 10px; }
        .controls { grid-column: 2 / 3; grid-row: 4 / 5; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 20px; border-top: 1px solid var(--border-color); flex-wrap: wrap; gap: 15px; }

        .grid-item {
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-color); border-radius: 8px;
            cursor: pointer; font-size: 0.9em; background: var(--option-bg);
            color: var(--text-muted); transition: all 0.2s ease; font-weight: 500;
        }
        .grid-item:hover:not(.active) { background: var(--option-hover); }
        .grid-item.active { border: 2px solid var(--yandex-yellow); background: var(--yandex-yellow); color: #000; transform: scale(1.1); font-weight: 700; }
        .grid-item.answered-correct { background: var(--correct-border); color: #000; border-color: var(--correct-border); }
        .grid-item.answered-incorrect { background: var(--error-border); color: #fff; border-color: var(--error-border); }
        .grid-item.answered-hint { background: var(--hint-color); color: #000; border-color: var(--hint-color); }
        
        .question-title { color: var(--yandex-yellow); font-size: 0.95em; text-transform: uppercase; font-weight: 700;}
        .question-status { font-weight: 700; font-size: 1em; }
        .status-correct { color: var(--correct-border); }
        .status-incorrect { color: var(--error-border); }
        .status-hint { color: var(--hint-color); }
        
        .option {
            display: flex; align-items: center; padding: 14px 18px; margin-bottom: 10px;
            background: var(--option-bg); border: 2px solid transparent; border-radius: 12px;
            cursor: pointer; transition: all 0.2s ease; font-size: 1.05em; color: #EBEBEB;
        }
        .option:hover:not(.disabled) { background: var(--option-hover); }
        .option.disabled { cursor: default; }
        .option.selected { border-color: var(--yandex-yellow); background: rgba(252, 223, 48, 0.05); }
        .option.correct-answer { background: var(--correct-bg); border-color: var(--correct-border); }
        .option.wrong-answer { background: var(--error-bg); border-color: var(--error-border); }
        .option input { margin-right: 15px; transform: scale(1.3); cursor: pointer; accent-color: var(--yandex-yellow);}
        .option.disabled input { cursor: default; }
        
        .controls-left, .controls-right { display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: 600; font-family: 'YS Text', sans-serif; transition: all 0.2s; }
        .btn-primary { background: var(--yandex-yellow); color: #000; }
        .btn-primary:hover:not(:disabled) { background: var(--yandex-yellow-hover); transform: translateY(-2px); }
        .btn-primary:disabled { background: #3A3A3C; color: #666; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #2C2C2E; color: #EBEBEB; border: 1px solid #3A3A3C; }
        .btn-secondary:hover { background: #3A3A3C; border-color: #4A4A4C; }
        .btn-hint { background: transparent; color: var(--hint-color); border: 1px solid var(--hint-color); }
        .btn-hint:hover { background: rgba(255, 159, 10, 0.1); }
        .btn-check { background: var(--correct-border); color: #000; }
        .btn-check:hover { background: #2eb82e; }
        
        .result-stats { text-align: center; padding: 40px; background: var(--option-bg); border-radius: 16px; margin-bottom: 30px; border: 2px dashed var(--yandex-yellow); }
        .result-stats h2 { margin-top: 0; font-size: 1.8em; color: #fff; }
        .result-score { font-size: 3.5em; font-weight: 700; color: var(--yandex-yellow); margin: 15px 0; line-height: 1; }
        .footer { text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 0.85em; letter-spacing: 0.5px; }

        @media (max-width: 850px) {
            #quiz-container { display: flex; flex-direction: column; gap: 20px; }
            .question-grid { max-height: 200px; grid-column: auto; grid-row: auto; }
            .question-header, .question-text, #options-container, .controls { grid-column: auto; grid-row: auto; }
            .dropdown { margin-left: 0; margin-top: 10px; width: 100%; }
            .btn-menu { width: 100%; justify-content: space-between; }
            .dropdown-content { width: 100%; min-width: unset; }
        }
    </style>
</head>
<body>

            <!-- ====== НАЧАЛО: ВЫПАДАЮЩЕЕ МЕНЮ ====== -->
            <div class="dropdown">

<script>
    // Скрипт для работы выпадающего меню
    function toggleMenu(event) {
        event.stopPropagation();
        document.getElementById("linksDropdown").classList.toggle("show");
    }

    // Закрывать меню, если кликнуть в любом другом месте экрана
    window.onclick = function(event) {
        if (!event.target.closest('.btn-menu')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    }

    const db_questions = [
        {q:"Что означает термин «условия показа»?",o:["Таргетинги, задаваемые в группе объявлений","Правила модерации, предъявляемые к объявлениям","Поисковые запросы, которые ввёл пользователь"],c:[0]},

        {q:"Как называется рекламный блок с объявлениями из ТГО-кампаний (без картинок), расположенный в верхней части первой страницы поисковой выдачи Яндекса?",o:["Специальные показы","Премиальные показы (Премиум-показы)","Товарная галерея","Гарантированные показы"],c:[1]},

        {q:"Что такое сегмент Метрики?",o:["Часть пользователей, контакты которых загружены в Аудитории","Часть пользователей, которые были в заданном радиусе","Часть визитов или просмотров, выделенных по какому-либо признаку"],c:[2]},

    ];
    let questions = [];
    let currentQuestion = 0;
    let userAnswers = {};
    let isFinished = false;
    let currentShuffledOptions = [];
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }
    function initQuestions() {
        let indices = Array.from({length: db_questions.length}, (_, i) => i);
        indices = shuffleArray(indices);
        questions = indices.map(idx => {
            return { id: idx, ...db_questions[idx] };
        });
    }
    function init() {
        initQuestions();
        renderGrid();
        renderQuestion();
    }
    function renderGrid() {
        const grid = document.getElementById('question-grid');
        grid.innerHTML = '';
        questions.forEach((q, displayIdx) => {
            const div = document.createElement('div');
            let classes = ['grid-item'];
            if (displayIdx === currentQuestion) classes.push('active');
            const state = userAnswers[q.id];
            if (state && state.checked) {
                if (state.usedHint) classes.push('answered-hint');
                else if (state.isCorrect) classes.push('answered-correct');
                else classes.push('answered-incorrect');
            }
            div.className = classes.join(' ');
            div.innerText = displayIdx + 1;
            div.onclick = () => {
                currentQuestion = displayIdx;
                currentShuffledOptions = [];
                renderQuestion();
            };
            grid.appendChild(div);
        });
    }
    function renderQuestion() {
        if (isFinished) return;
        renderGrid();
        const qData = questions[currentQuestion];
        const isMultiple = qData.c.length > 1;
        const state = userAnswers[qData.id] || { selected: [], checked: false, isCorrect: false, usedHint: false, savedOrder: null };
        document.getElementById('question-title').innerText = `Вопрос ${currentQuestion + 1} из ${questions.length}` + (isMultiple ? ' (несколько вариантов)' : ' (один вариант)');
        document.getElementById('question-text').innerText = qData.q;
        const statusEl = document.getElementById('question-status');
        if (state.checked) {
            if (state.usedHint) {
                statusEl.innerText = "💡 Использована подсказка";
                statusEl.className = "question-status status-hint";
            } else {
                statusEl.innerText = state.isCorrect ? "✅ Верно" : "❌ Ошибка";
                statusEl.className = "question-status " + (state.isCorrect ? "status-correct" : "status-incorrect");
            }
        } else {
            statusEl.innerText = "";
            statusEl.className = "question-status";
        }
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        if (state.savedOrder) {
            currentShuffledOptions = state.savedOrder;
        } else if (currentShuffledOptions.length === 0) {
            let indices = Array.from({length: qData.o.length}, (_, i) => i);
            currentShuffledOptions = shuffleArray(indices);
            if (!userAnswers[qData.id]) {
                userAnswers[qData.id] = { selected: [], checked: false, isCorrect: false, usedHint: false, savedOrder: currentShuffledOptions };
            } else {
                userAnswers[qData.id].savedOrder = currentShuffledOptions;
            }
        }
        currentShuffledOptions.forEach((originalIdx) => {
            const optText = qData.o[originalIdx];
            const label = document.createElement('label');
            let classes = ['option'];
            const input = document.createElement('input');
            input.type = isMultiple ? 'checkbox' : 'radio';
            input.name = 'option';
            input.value = originalIdx;
            if (state.selected.includes(originalIdx)) {
                input.checked = true;
                if (!state.checked) classes.push('selected');
            }
            if (state.checked) {
                classes.push('disabled');
                input.disabled = true;
                const isThisCorrectOption = qData.c.includes(originalIdx);
                const isThisSelectedOption = state.selected.includes(originalIdx);
                if (isThisCorrectOption) classes.push('correct-answer');
                else if (isThisSelectedOption && !isThisCorrectOption) classes.push('wrong-answer');
            }
            input.onchange = () => {
                if (state.checked) return;
                if (!userAnswers[qData.id]) {
                    userAnswers[qData.id] = { selected: [], checked: false, isCorrect: false, usedHint: false, savedOrder: currentShuffledOptions };
                }
                if (isMultiple) {
                    if (input.checked) userAnswers[qData.id].selected.push(originalIdx);
                    else userAnswers[qData.id].selected = userAnswers[qData.id].selected.filter(val => val !== originalIdx);
                } else {
                    userAnswers[qData.id].selected = [originalIdx];
                }
                renderQuestion();
            };
            label.className = classes.join(' ');
            label.appendChild(input);
            label.appendChild(document.createTextNode(optText));
            optionsContainer.appendChild(label);
        });
        updateButtons(state);
    }
    function updateButtons(state) {
        document.getElementById('btn-prev').style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
        const btnHint = document.getElementById('btn-hint');
        btnHint.style.display = state.checked ? 'none' : 'block';
        const btnAction = document.getElementById('btn-action');
        if (!state.checked) {
            btnAction.innerText = 'Проверить ответ';
            btnAction.className = 'btn-primary btn-check';
            btnAction.disabled = state.selected.length === 0;
        } else {
            if (currentQuestion === questions.length - 1) {
                btnAction.innerText = 'Завершить тест';
                btnAction.className = 'btn-finish';
                btnAction.disabled = false;
            } else {
                btnAction.innerText = 'Далее ➔';
                btnAction.className = 'btn-primary';
                btnAction.disabled = false;
            }
        }
    }
    function useHint() {
        const qData = questions[currentQuestion];
        let state = userAnswers[qData.id];
        if (!state) state = { selected: [], checked: false, isCorrect: false, usedHint: false, savedOrder: currentShuffledOptions };
        state.selected = [...qData.c];
        state.checked = true;
        state.isCorrect = false;
        state.usedHint = true;
        userAnswers[qData.id] = state;
        renderQuestion();
    }
    function handleAction() {
        const qData = questions[currentQuestion];
        const state = userAnswers[qData.id] || { selected: [], checked: false, isCorrect: false, usedHint: false, savedOrder: currentShuffledOptions };
        if (!state.checked) {
            const correctSorted = [...qData.c].sort();
            const selectedSorted = [...state.selected].sort();
            const isCorrect = JSON.stringify(correctSorted) === JSON.stringify(selectedSorted);
            state.checked = true;
            state.isCorrect = isCorrect;
            userAnswers[qData.id] = state;
            renderQuestion();
        } else {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                currentShuffledOptions = [];
                renderQuestion();
            } else {
                finishQuiz();
            }
        }
    }
    function prevQuestion() {
        if (currentQuestion > 0) {
            currentQuestion--;
            currentShuffledOptions = [];
            renderQuestion();
        }
    }
    function saveProgress() {
        const saveData = { answers: userAnswers, questionOrder: questions.map(q => q.id) };
        const dataStr = JSON.stringify(saveData);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "yandex_direct_pro_progress.json";
        a.click();
    }
    function loadProgress(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const loadedData = JSON.parse(e.target.result);
                if (loadedData.answers && loadedData.questionOrder) {
                    userAnswers = loadedData.answers;
                    questions = loadedData.questionOrder.map(id => {
                        return { id: id, ...db_questions[id] };
                    });
                } else {
                    userAnswers = loadedData;
                }
                isFinished = false;
                document.getElementById('quiz-container').style.display = 'grid'; 
                document.getElementById('results-container').style.display = 'none';
                let firstUnanswered = 0;
                for(let i=0; i<questions.length; i++) {
                    const qId = questions[i].id;
                    if(!userAnswers[qId] || !userAnswers[qId].checked) {
                        firstUnanswered = i;
                        break;
                    }
                }
                currentQuestion = firstUnanswered;
                currentShuffledOptions = [];
                renderQuestion();
                alert("Прогресс успешно загружен!");
            } catch (err) {
                alert("Ошибка при чтении файла сохранения.");
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }
    function finishQuiz() {
        isFinished = true;
        document.getElementById('quiz-container').style.display = 'none';
        const resultsContainer = document.getElementById('results-container');
        resultsContainer.style.display = 'block';
        let score = 0;
        let checkedCount = 0;
        let hintCount = 0;
        questions.forEach((q) => {
            const state = userAnswers[q.id];
            if (state && state.checked) {
                checkedCount++;
                if (state.usedHint) hintCount++;
                if (state.isCorrect && !state.usedHint) score++;
            }
        });
        const percentage = checkedCount === 0 ? 0 : Math.round((score / questions.length) * 100);
        let html = `<div class="result-stats">
            <h2>Тест завершен!</h2>
            <span style="font-size: 0.8em; color: var(--text-muted);">Отвечено на ${checkedCount} из ${questions.length} вопросов</span><br>
            <div class="result-score">${score}</div>
            <span style="color: #aaa; font-size: 1.2em;">Правильных ответов (${percentage}%)</span><br>
            <span style="color: var(--hint-color); font-size: 0.9em; display: block; margin-top: 20px;">Использовано подсказок: ${hintCount}</span>
        </div>`;
        html += `<button class="btn-primary" style="width: 100%; padding: 18px; font-size: 1.2em;" onclick="restartQuiz()">Начать заново (сбросить прогресс)</button>`;
        resultsContainer.innerHTML = html;
    }
    function restartQuiz() {
        if(confirm("Весь текущий прогресс будет сброшен. Уверены?")) {
            userAnswers = {};
            currentQuestion = 0;
            currentShuffledOptions = [];
            isFinished = false;
            document.getElementById('quiz-container').style.display = 'grid'; 
            document.getElementById('results-container').style.display = 'none';
            initQuestions();
            renderQuestion();
        }
    }
    init();
</script>
