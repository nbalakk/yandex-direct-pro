<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тренажер | PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=YS+Text:wght@400;500;700&display=swap');
        
        :root {
            --bg-body-dark: #111112;
            --bg-card-dark: #1C1C1E;
            --text-main-dark: #FFFFFF;
            --text-muted-dark: #8A8A8E;
            --yandex-yellow-dark: #FCDF30;
            --yandex-yellow-hover-dark: #F2D22E;
            --border-color-dark: #2C2C2E;
            --correct-bg-dark: rgba(50, 205, 50, 0.15);
            --correct-border-dark: #32CD32;
            --error-bg-dark: rgba(255, 69, 58, 0.15);
            --error-border-dark: #FF453A;
            --hint-color-dark: #FF9F0A;
            --option-bg-dark: #2C2C2E;
            --option-hover-dark: #3A3A3C;
            --btn-secondary-bg-dark: #2C2C2E;
            --btn-secondary-border-dark: #3A3A3C;
            --grid-unanswered-dark: #4A4A4C;
            
            --bg-body-light: #F0F0F2;
            --bg-card-light: #FFFFFF;
            --text-main-light: #000000;
            --text-muted-light: #666666;
            --yandex-yellow-light: #FFCC00;
            --yandex-yellow-hover-light: #E6B800;
            --border-color-light: #E5E5EA;
            --correct-bg-light: rgba(52, 199, 89, 0.15);
            --correct-border-light: #34C759;
            --error-bg-light: rgba(255, 59, 48, 0.15);
            --error-border-light: #FF3B30;
            --hint-color-light: #FF9500;
            --option-bg-light: #F2F2F7;
            --option-hover-light: #E5E5EA;
            --btn-secondary-bg-light: #F2F2F7;
            --btn-secondary-border-light: #D1D1D6;
            --grid-unanswered-light: #D1D1D6;

            --bg-body: var(--bg-body-dark);
            --bg-card: var(--bg-card-dark);
            --text-main: var(--text-main-dark);
            --text-muted: var(--text-muted-dark);
            --yandex-yellow: var(--yandex-yellow-dark);
            --yandex-yellow-hover: var(--yandex-yellow-hover-dark);
            --border-color: var(--border-color-dark);
            --correct-bg: var(--correct-bg-dark);
            --correct-border: var(--correct-border-dark);
            --error-bg: var(--error-bg-dark);
            --error-border: var(--error-border-dark);
            --hint-color: var(--hint-color-dark);
            --option-bg: var(--option-bg-dark);
            --option-hover: var(--option-hover-dark);
            --btn-secondary-bg: var(--btn-secondary-bg-dark);
            --btn-secondary-border: var(--btn-secondary-border-dark);
            --grid-unanswered: var(--grid-unanswered-dark);
        }

        body.theme-light {
            --bg-body: var(--bg-body-light);
            --bg-card: var(--bg-card-light);
            --text-main: var(--text-main-light);
            --text-muted: var(--text-muted-light);
            --yandex-yellow: var(--yandex-yellow-light);
            --yandex-yellow-hover: var(--yandex-yellow-hover-light);
            --border-color: var(--border-color-light);
            --correct-bg: var(--correct-bg-light);
            --correct-border: var(--correct-border-light);
            --error-bg: var(--error-bg-light);
            --error-border: var(--error-border-light);
            --hint-color: var(--hint-color-light);
            --option-bg: var(--option-bg-light);
            --option-hover: var(--option-hover-light);
            --btn-secondary-bg: var(--btn-secondary-bg-light);
            --btn-secondary-border: var(--btn-secondary-border-light);
            --grid-unanswered: var(--grid-unanswered-light);
        }

        body {
            font-family: 'YS Text', 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0; padding: 20px 10px; line-height: 1.5;
            display: flex; flex-direction: column; min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 1400px; margin: 0 auto;
            background: var(--bg-card); padding: 30px;
            border-radius: 20px; border: 1px solid var(--border-color);
            flex-grow: 1; width: 100%; box-sizing: border-box;
            display: flex; flex-direction: column;
        }
        body:not(.theme-light) .container { box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        /* --- HEADER --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap; gap: 15px;
        }
        .header-left { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .title-text { font-size: 1.3em; font-weight: 700; color: var(--text-main); white-space: nowrap; }
        .title-divider { color: var(--text-muted); margin: 0 10px; }

        .quiz-selector {
            background: var(--bg-card); color: var(--text-main);
            border: 1px solid var(--border-color); padding: 8px 16px;
            border-radius: 8px; font-size: 0.9em; font-weight: 500;
            cursor: pointer; outline: none; height: 38px;
        }
        .dropdown { position: relative; display: inline-block; }
        .btn-menu {
            background: transparent; color: var(--text-muted);
            border: 1px solid var(--border-color); padding: 8px 16px;
            border-radius: 8px; cursor: pointer; font-size: 0.9em;
            display: flex; align-items: center; gap: 6px; height: 38px;
        }
        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 0;
            margin-top: 8px; background-color: var(--bg-card);
            min-width: 260px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid var(--border-color); border-radius: 12px;
            z-index: 1000; overflow: hidden;
        }
        .dropdown-content.show { display: block; animation: fadeIn 0.2s ease; }
        .dropdown-content a {
            color: var(--text-main); padding: 14px 18px; text-decoration: none;
            display: flex; align-items: center; gap: 10px; font-size: 0.95em;
            transition: background 0.2s; border-bottom: 1px solid var(--border-color);
        }
        .dropdown-content a:hover { background-color: var(--option-hover); color: var(--yandex-yellow); }

        .header-right { display: flex; gap: 10px; align-items: center; }
        .btn-secondary { 
            background: var(--btn-secondary-bg); color: var(--text-main); 
            border: 1px solid var(--btn-secondary-border); height: 38px;
            display: flex; align-items: center; justify-content: center;
            gap: 6px; padding: 0 16px; border-radius: 8px; cursor: pointer;
            font-size: 0.9em; transition: all 0.2s;
        }
        .btn-icon-only { width: 38px; padding: 0; font-size: 1.2em; }

        .theme-switch-wrapper { display: flex; align-items: center; gap: 8px; }
        .theme-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--option-bg); border: 1px solid var(--border-color);
            transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 3px; bottom: 3px; background-color: var(--text-muted);
            transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--yandex-yellow); border-color: var(--yandex-yellow); }
        input:checked + .slider:before { transform: translateX(20px); background-color: #000; }

        .mode-selector {
            display: flex; gap: 10px; margin-bottom: 20px;
            background: var(--option-bg); padding: 5px; border-radius: 10px; width: fit-content;
        }
        .mode-btn {
            background: transparent; border: none; color: var(--text-muted);
            padding: 8px 20px; border-radius: 6px; cursor: pointer;
            font-family: 'YS Text', sans-serif; font-weight: 600; font-size: 0.95em;
        }
        .mode-btn.active { background: var(--bg-card); color: var(--text-main); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* --- ОСНОВНОЙ КОНТЕЙНЕР --- */
        #quiz-container { display: grid; grid-template-columns: 320px 1fr; gap: 40px; flex-grow: 1; }
        .question-grid { display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px; max-height: 65vh; overflow-y: auto; padding-right: 10px; }
        .grid-item {
            width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer;
            font-size: 0.9em; background: var(--option-bg); color: var(--text-muted); font-weight: 500;
        }
        .grid-item.active { border: 2px solid var(--yandex-yellow); background: var(--yandex-yellow); color: #000; transform: scale(1.1); font-weight: 700; }
        
        .mode-training .grid-item.answered-correct, .mode-review .grid-item.answered-correct { background: var(--correct-border); color: #000; border-color: var(--correct-border); }
        .mode-training .grid-item.answered-incorrect, .mode-review .grid-item.answered-incorrect { background: var(--error-border); color: #fff; border-color: var(--error-border); }
        .mode-training .grid-item.answered-hint { background: var(--hint-color); color: #000; border-color: var(--hint-color); }
        .mode-review .grid-item.unanswered { background: var(--error-border); color: #fff; border-color: var(--error-border); opacity: 0.7;}
        .mode-exam .grid-item.answered { background: var(--grid-unanswered); color: var(--text-main); border-color: var(--text-muted); }

        .question-title { color: var(--yandex-yellow); font-size: 0.95em; text-transform: uppercase; font-weight: 700; }
        body.theme-light .question-title { color: #E6B800; }
        .question-status { font-weight: 700; font-size: 1em; }
        .status-correct { color: var(--correct-border); }
        .status-incorrect { color: var(--error-border); }
        .question-text { font-size: 1.3em; font-weight: 500; margin: 0; color: var(--text-main); line-height: 1.4; }

        .option {
            display: flex; align-items: center; padding: 14px 18px; margin-bottom: 10px;
            background: var(--option-bg); border: 2px solid transparent; border-radius: 12px;
            cursor: pointer; transition: all 0.2s ease; font-size: 1.05em; color: var(--text-main);
        }
        .option:hover:not(.disabled) { background: var(--option-hover); }
        .option.selected { border-color: var(--yandex-yellow); background: rgba(252, 223, 48, 0.05); }
        .option.correct-answer { background: var(--correct-bg); border-color: var(--correct-border); }
        .option.wrong-answer { background: var(--error-bg); border-color: var(--error-border); }
        .mode-training .option.missed-correct, .mode-review .option.missed-correct { border-color: var(--correct-border); background: var(--correct-bg); box-shadow: 0 0 10px rgba(50, 205, 50, 0.2); }
        .option input { margin-right: 15px; transform: scale(1.3); accent-color: var(--yandex-yellow); }

        /* --- КНОПКИ ПАНЕЛИ УПРАВЛЕНИЯ --- */
        .controls { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-top: 10px; padding-top: 20px; border-top: 1px solid var(--border-color); flex-wrap: wrap; gap: 15px; 
        }
        .controls-left, .controls-right { display: flex; gap: 10px; align-items: center; }

        /* Общий стиль для кнопок-близнецов (Подсказка и Справочник) */
        .btn-hint, .btn-ref {
            background: transparent; color: var(--yandex-yellow); 
            border: 1px solid var(--yandex-yellow); border-radius: 8px; 
            cursor: pointer; font-size: 0.85em; font-weight: 600; 
            padding: 8px 16px; transition: all 0.2s; text-decoration: none;
            display: flex; align-items: center; gap: 6px;
        }
        body.theme-light .btn-hint, body.theme-light .btn-ref { color: #E6B800; border-color: #E6B800; }
        .btn-hint:hover, .btn-ref:hover { background: rgba(252, 223, 48, 0.1); }
        
        .btn-primary { 
            background: var(--yandex-yellow); color: #000; border: none; 
            border-radius: 8px; padding: 10px 20px; font-weight: 600; cursor: pointer;
        }
        .btn-primary:disabled { background: var(--option-hover); color: var(--text-muted); cursor: not-allowed; }

        /* --- ЭКЗАМЕН --- */
        #exam-setup { display: none; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; padding: 40px 0; }
        .exam-options { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .exam-card { background: var(--option-bg); border: 2px solid var(--border-color); border-radius: 16px; padding: 30px; width: 250px; text-align: center; cursor: pointer; transition: 0.2s; }
        .exam-card.selected { border-color: var(--yandex-yellow); background: rgba(252, 223, 48, 0.05); }
        .exam-info-bar { display: none; justify-content: space-between; align-items: center; background: rgba(252, 223, 48, 0.1); border: 1px solid rgba(252, 223, 48, 0.3); padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; }
        .timer { font-size: 1.5em; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text-main); }
        .timer.warning { color: var(--error-border); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- РЕЗУЛЬТАТЫ --- */
        .result-stats { text-align: center; padding: 40px; background: var(--option-bg); border-radius: 16px; margin-bottom: 30px; border: 2px dashed var(--yandex-yellow); }
        .result-score { font-size: 3.5em; font-weight: 700; color: var(--yandex-yellow); margin: 15px 0; line-height: 1; }
        .result-actions { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .result-actions button { flex: 1; padding: 18px; font-size: 1.1em; min-width: 250px; height: 60px; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 850px) {
            #quiz-container { display: flex; flex-direction: column; gap: 20px; }
            .question-grid { max-height: 200px; }
            .header-left, .header-right { justify-content: space-between; width: 100%; }
        }
        .footer { text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 0.85em; letter-spacing: 0.5px; }
    </style>
</head>
<body class="mode-training">
<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="title-text">Тренажер</div>
            <span class="title-divider">|</span>
            <select id="quiz-selector" class="quiz-selector" onchange="changeQuizType()">
                <option value="direct">Яндекс Директ Продвинутый</option>
                <option value="metrica">Яндекс Метрика</option>
            </select>
            
            <div class="dropdown">
                <button class="btn-menu" onclick="toggleMenu(event)">Полезные материалы ▼</button>
                <div class="dropdown-content" id="linksDropdown">
                    <a href="https://yandex.ru/adv/edu/online/direct-prodvinutyy" target="_blank">📄 Инструкция по подготовке</a>
                    <a href="https://yandex.ru/support/direct/ru/" target="_blank">📚 Дополнительные материалы</a>
                    <a href="https://t.me/nbalakk" target="_blank">💬 Связь со мной / Telegram</a>
                </div>
            </div>
        </div>
        <div class="header-right" id="header-controls">
            <div class="theme-switch-wrapper">
                <span class="theme-icon">🌙</span>
                <label class="theme-switch">
                    <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                    <span class="slider"></span>
                </label>
                <span class="theme-icon">☀️</span>
            </div>
            <span class="title-divider" style="margin: 0 5px;">|</span>
            <button class="btn-secondary btn-icon-only" onclick="saveProgress()" title="Сохранить">💾</button>
            <button class="btn-secondary btn-icon-only" onclick="document.getElementById('fileInput').click()" title="Загрузить">📁</button>
            <input type="file" id="fileInput" style="display:none" accept=".json" onchange="loadProgress(event)">
        </div>
    </div>

    <div class="mode-selector" id="mode-selector">
        <button class="mode-btn active" id="btn-mode-training" onclick="setMode('training')">Тренажер</button>
        <button class="mode-btn" id="btn-mode-exam" onclick="setMode('exam')">Экзамен</button>
    </div>

    <div class="exam-info-bar" id="exam-info-bar">
        <div id="exam-info-text" style="font-weight: 500;">Экзамен: Быстрый</div>
        <div class="timer" id="exam-timer">⏱ 20:00</div>
        <button class="btn-secondary" style="border-color: var(--error-border); color: var(--error-border);" onclick="forceFinishExam()">Завершить досрочно</button>
    </div>

    <div id="exam-setup">
        <h2>Выберите тип экзамена</h2>
        <div class="exam-options">
            <div class="exam-card" id="card-exam-fast" onclick="selectExamType('fast')">
                <h3>Быстрый</h3>
                <p><span class="highlight" id="fast-q-count">20</span> вопросов / 20 мин</p>
            </div>
            <div class="exam-card" id="card-exam-full" onclick="selectExamType('full')">
                <h3>Полный</h3>
                <p><span class="highlight" id="full-q-count">60</span> вопросов / 60 мин</p>
            </div>
        </div>
        <button class="btn-primary" id="btn-start-exam" onclick="startExam()" disabled style="margin-top:30px; padding: 15px 40px;">Начать экзамен</button>
    </div>

    <div id="quiz-container">
        <div id="question-grid" class="question-grid"></div>
        <div id="question-content">
            <div class="question-header">
                <div class="question-title" id="question-title">Вопрос 1</div>
                <div class="question-status" id="question-status"></div>
            </div>
            <div class="question-text" id="question-text">Текст вопроса</div>
            <div id="options-container" style="margin-top: 20px;"></div>
            
            <div class="controls">
                <div class="controls-left">
                    <button id="btn-prev" class="btn-secondary" onclick="prevQuestion()">Назад</button>
                    <!-- КНОПКИ-БЛИЗНЕЦЫ -->
                    <button id="btn-hint" class="btn-hint" onclick="useHint()">💡 Подсказка</button>
                    <div id="ref-button-container"></div>
                </div>
                <div class="controls-right">
                    <button id="btn-action" class="btn-primary" onclick="handleAction()">Проверить ответ</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="results-container" style="display:none;"></div>
</div>

<div class="footer">Подготовка к сертификации PRO | tg @nbalakk © 2026 v.1.14</div>

<script src="data/direct.js"></script>
<script src="data/metrica.js"></script>

<script>
    // --- ТЕМА ---
    function toggleTheme() {
        const isLight = document.getElementById('theme-toggle').checked;
        document.body.classList.toggle('theme-light', isLight);
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }
    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('theme') === 'light') {
            document.getElementById('theme-toggle').checked = true;
            document.body.classList.add('theme-light');
        }
        init();
    });

    // --- ЛОГИКА ---
    let hasUnsavedChanges = false;
    window.onbeforeunload = (e) => (hasUnsavedChanges || currentMode === 'exam_active') ? true : null;

    function toggleMenu(event) {
        event.stopPropagation();
        document.getElementById("linksDropdown").classList.toggle("show");
    }
    window.onclick = () => document.getElementById("linksDropdown").classList.remove('show');

    const quizDatabases = { direct: db_direct_base, metrica: db_metrica_base };
    let currentQuizType = 'direct';
    let db_questions = quizDatabases[currentQuizType];
    let questions = [];
    let currentQuestion = 0;
    let currentMode = 'training';
    let selectedExamType = null;
    let examTimerInterval = null;
    let examTimeLeft = 0;
    let progressStore = { direct: { userAnswers: {} }, metrica: { userAnswers: {} } };
    let userAnswers = {};

    function shuffleArray(array) {
        let cur = array.length, random;
        while (cur != 0) {
            random = Math.floor(Math.random() * cur);
            cur--;
            [array[cur], array[random]] = [array[random], array[cur]];
        }
        return array;
    }

    function initQuestions(count = null) {
        let indices = Array.from({length: db_questions.length}, (_, i) => i);
        shuffleArray(indices);
        if (count) indices = indices.slice(0, Math.min(count, db_questions.length));
        questions = indices.map(idx => ({ id: idx, ...db_questions[idx] }));
    }

    function setMode(mode) {
        if (currentMode === 'exam_active' && !['exam_active', 'exam_finished', 'exam_review'].includes(mode)) {
            if (!confirm("Прервать экзамен?")) return;
            clearInterval(examTimerInterval);
        }
        currentMode = mode;
        document.getElementById('btn-mode-training').classList.toggle('active', mode === 'training');
        document.getElementById('btn-mode-exam').classList.toggle('active', mode !== 'training');
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('results-container').style.display = 'none';
        document.getElementById('exam-setup').style.display = 'none';
        document.getElementById('exam-info-bar').style.display = 'none';

        if (mode === 'training') {
            userAnswers = progressStore[currentQuizType].userAnswers || {};
            if (progressStore[currentQuizType].questions) questions = progressStore[currentQuizType].questions;
            else initQuestions();
            currentQuestion = progressStore[currentQuizType].currentQuestion || 0;
            document.getElementById('quiz-container').style.display = 'grid';
            renderQuestion();
        } else if (mode === 'exam') {
            document.getElementById('exam-setup').style.display = 'flex';
            updateExamCardNumbers();
            document.getElementById('btn-start-exam').disabled = true;
        } else if (mode === 'exam_active') {
            document.getElementById('exam-info-bar').style.display = 'flex';
            document.getElementById('quiz-container').style.display = 'grid';
            renderQuestion();
        } else if (mode === 'exam_review') {
            document.getElementById('quiz-container').style.display = 'grid';
            currentQuestion = 0; renderQuestion();
        }
    }

    function selectExamType(type) {
        selectedExamType = type;
        document.querySelectorAll('.exam-card').forEach(el => el.classList.toggle('selected', el.id.includes(type)));
        document.getElementById('btn-start-exam').disabled = false;
    }

    function startExam() {
        let qCount = selectedExamType === 'fast' ? 20 : 60;
        initQuestions(qCount);
        userAnswers = {}; currentQuestion = 0;
        examTimeLeft = (selectedExamType === 'fast' ? 20 : 60) * 60;
        updateTimerDisplay();
        examTimerInterval = setInterval(() => {
            examTimeLeft--; updateTimerDisplay();
            if (examTimeLeft <= 0) { clearInterval(examTimerInterval); finishQuiz(); }
        }, 1000);
        setMode('exam_active');
    }

    function updateTimerDisplay() {
        const m = Math.floor(examTimeLeft / 60).toString().padStart(2, '0');
        const s = (examTimeLeft % 60).toString().padStart(2, '0');
        document.getElementById('exam-timer').innerText = `⏱ ${m}:${s}`;
    }

    function renderQuestion() {
        renderGrid();
        const qData = questions[currentQuestion];
        const state = userAnswers[qData.id] || { selected: [], checked: false };
        const isMultiple = qData.c.length > 1;

        document.getElementById('question-title').innerText = `Вопрос ${currentQuestion + 1} из ${questions.length}`;
        document.getElementById('question-text').innerText = qData.q;
        
        const statusEl = document.getElementById('question-status');
        statusEl.innerText = state.checked ? (state.isCorrect ? "✅ Верно" : "❌ Ошибка") : "";
        statusEl.className = `question-status ${state.isCorrect ? 'status-correct' : 'status-incorrect'}`;

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        if (!state.savedOrder) {
            state.savedOrder = shuffleArray(Array.from({length: qData.o.length}, (_, i) => i));
            userAnswers[qData.id] = state;
        }

        state.savedOrder.forEach(idx => {
            const label = document.createElement('label');
            label.className = 'option';
            const input = document.createElement('input');
            input.type = isMultiple ? 'checkbox' : 'radio';
            input.checked = state.selected.includes(idx);
            
            if (state.checked || currentMode === 'exam_review') {
                input.disabled = true;
                if (qData.c.includes(idx)) label.classList.add('correct-answer');
                if (state.selected.includes(idx) && !qData.c.includes(idx)) label.classList.add('wrong-answer');
                if (!state.selected.includes(idx) && qData.c.includes(idx) && (currentMode === 'training' || currentMode === 'exam_review')) label.classList.add('missed-correct');
            }

            input.onchange = () => {
                if (isMultiple) {
                    if (input.checked) state.selected.push(idx);
                    else state.selected = state.selected.filter(v => v !== idx);
                } else state.selected = [idx];
                hasUnsavedChanges = true;
                renderQuestion();
            };
            label.appendChild(input);
            label.appendChild(document.createTextNode(qData.o[idx]));
            container.appendChild(label);
        });

        // --- ЛОГИКА КНОПКИ СПРАВОЧНИКА ---
        const refContainer = document.getElementById('ref-button-container');
        refContainer.innerHTML = '';
        if (currentMode !== 'exam_active') {
            const refBtn = document.createElement('a');
            refBtn.className = 'btn-ref';
            refBtn.innerHTML = 'ⓘ Справочная информация по вопросу';
            if (qData.ref && qData.ref.trim() !== "") {
                refBtn.href = qData.ref; refBtn.target = "_blank";
            } else {
                refBtn.onclick = () => alert("Упс... Не нашли информацию, но можете найти и написать в tg: @nbalakk :)");
            }
            refContainer.appendChild(refBtn);
        }

        updateButtons(state);
    }

    function renderGrid() {
        const grid = document.getElementById('question-grid');
        grid.innerHTML = '';
        questions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'grid-item' + (idx === currentQuestion ? ' active' : '');
            const s = userAnswers[q.id];
            if (s?.checked) {
                if (s.usedHint) div.classList.add('answered-hint');
                else if (s.isCorrect) div.classList.add('answered-correct');
                else div.classList.add('answered-incorrect');
            } else if (currentMode === 'exam_active' && s?.selected.length) div.classList.add('answered');
            div.innerText = idx + 1;
            div.onclick = () => { currentQuestion = idx; renderQuestion(); };
            grid.appendChild(div);
        });
    }

    function updateButtons(state) {
        document.getElementById('btn-prev').style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
        document.getElementById('btn-hint').style.display = (currentMode === 'training' && !state.checked) ? 'block' : 'none';
        const btn = document.getElementById('btn-action');
        btn.innerText = state.checked ? (currentQuestion === questions.length - 1 ? 'Завершить' : 'Далее ➔') : 'Проверить ответ';
        if (currentMode === 'exam_active') btn.innerText = currentQuestion === questions.length - 1 ? 'Завершить экзамен' : 'Далее ➔';
        btn.disabled = (currentMode === 'training' && !state.checked && !state.selected.length);
    }

    function handleAction() {
        const qData = questions[currentQuestion];
        const state = userAnswers[qData.id];
        if (currentMode === 'training' && !state.checked) {
            state.isCorrect = JSON.stringify([...qData.c].sort()) === JSON.stringify([...state.selected].sort());
            state.checked = true;
            renderQuestion();
        } else {
            if (currentQuestion < questions.length - 1) { currentQuestion++; renderQuestion(); }
            else finishQuiz();
        }
    }

    function useHint() {
        const qData = questions[currentQuestion];
        userAnswers[qData.id] = { ...userAnswers[qData.id], selected: [...qData.c], checked: true, isCorrect: false, usedHint: true };
        renderQuestion();
    }

    function finishQuiz() {
        clearInterval(examTimerInterval);
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('exam-info-bar').style.display = 'none';
        const res = document.getElementById('results-container');
        res.style.display = 'block';
        
        let score = 0;
        questions.forEach(q => {
            let s = userAnswers[q.id];
            if (currentMode === 'exam_active') {
                if (!s) s = { selected: [], checked: true };
                const correctArr = [...q.c].sort();
                const selectedArr = s.selected ? [...s.selected].sort() : [];
                s.isCorrect = JSON.stringify(correctArr) === JSON.stringify(selectedArr);
                s.checked = true; userAnswers[q.id] = s;
            }
            if (s?.isCorrect && !s.usedHint) score++;
        });

        const perc = Math.round((score / questions.length) * 100);
        res.innerHTML = `
            <div class="result-stats">
                <h2>Результаты</h2>
                <div class="result-score">${score}</div>
                <p>из ${questions.length} правильных (${perc}%)</p>
            </div>
            <div class="result-actions">
                <button class="btn-secondary" onclick="setMode('exam_review')">Посмотреть ошибки</button>
                <button class="btn-primary" onclick="location.reload()">Начать заново</button>
            </div>
        `;
    }

    function prevQuestion() { if (currentQuestion > 0) { currentQuestion--; renderQuestion(); } }
    function changeQuizType() { currentQuizType = document.getElementById('quiz-selector').value; db_questions = quizDatabases[currentQuizType]; setMode('training'); }
    function updateExamCardNumbers() { document.getElementById('fast-q-count').innerText = Math.min(20, db_questions.length); document.getElementById('full-q-count').innerText = Math.min(60, db_questions.length); }
    function forceFinishExam() { if (confirm("Завершить досрочно?")) finishQuiz(); }
    function saveProgress() { 
        progressStore[currentQuizType] = { userAnswers, questions, currentQuestion };
        const blob = new Blob([JSON.stringify(progressStore)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "progress.json"; a.click();
    }
    function loadProgress(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { progressStore = JSON.parse(ev.target.result); setMode('training'); };
        reader.readAsText(e.target.files[0]);
    }
    function init() { setMode('training'); }
</script>
</body>
</html>
